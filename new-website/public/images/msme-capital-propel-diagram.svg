<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <defs>
    <!-- Background gradient: purple → pink → coral -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5b3faa"/>
      <stop offset="50%"  stop-color="#b8409a"/>
      <stop offset="100%" stop-color="#e84040"/>
    </linearGradient>

    <!-- Arrow/chevron pattern tile -->
    <pattern id="chevrons" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <!-- Single right-pointing chevron drawn as two lines -->
      <polyline points="10,12 22,24 10,36" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="26,12 38,24 26,36" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </pattern>

    <!-- Clip for rounded rect on the whole card -->
    <clipPath id="cardClip">
      <rect width="1200" height="520" rx="16" ry="16"/>
    </clipPath>

    <!-- Circle glow filter -->
    <filter id="circleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" rx="16" fill="url(#bgGrad)"/>
  <rect width="1200" height="520" rx="16" fill="url(#chevrons)"/>

  <!-- ───────── MSME CIRCLE (left) ───────── -->
  <!-- Curved arc connector from MSME bottom-left going under to Capital -->
  <path d="M 310,340 Q 480,480 560,300" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Arrowhead at end -->
  <polygon points="560,300 545,315 572,318" fill="white"/>

  <!-- Outer ring -->
  <circle cx="260" cy="220" r="118" fill="none" stroke="white" stroke-width="3.5" opacity="0.9"/>
  <!-- Inner white filled circle -->
  <circle cx="260" cy="220" r="96" fill="white" opacity="0.97"/>
  <!-- Building icon (simplified) -->
  <g transform="translate(185,145)">
    <!-- Main building -->
    <rect x="14" y="30" width="62" height="70" rx="2" fill="none" stroke="#b0408a" stroke-width="4"/>
    <!-- Left wing -->
    <rect x="0" y="46" width="18" height="54" rx="2" fill="none" stroke="#b0408a" stroke-width="3.5"/>
    <!-- Right wing -->
    <rect x="72" y="46" width="18" height="54" rx="2" fill="none" stroke="#b0408a" stroke-width="3.5"/>
    <!-- Windows rows -->
    <rect x="21" y="38" width="10" height="10" rx="1" fill="#b0408a"/>
    <rect x="37" y="38" width="10" height="10" rx="1" fill="#b0408a"/>
    <rect x="53" y="38" width="10" height="10" rx="1" fill="#b0408a"/>
    <rect x="21" y="55" width="10" height="10" rx="1" fill="#b0408a"/>
    <rect x="37" y="55" width="10" height="10" rx="1" fill="#b0408a"/>
    <rect x="53" y="55" width="10" height="10" rx="1" fill="#b0408a"/>
    <!-- Door -->
    <rect x="33" y="78" width="24" height="22" rx="2" fill="#b0408a"/>
  </g>
  <!-- MSME label above circle -->
  <text x="260" y="82" text-anchor="middle" font-family="'PT Sans', Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="3" fill="white">MSME</text>

  <!-- ───────── CAPITAL CIRCLE (center) ───────── -->
  <!-- Arc connector from Capital to Propel (top) -->
  <path d="M 690,100 Q 800,20 890,160" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="890,160 872,155 882,175" fill="white"/>

  <!-- Outer ring -->
  <circle cx="640" cy="250" r="128" fill="none" stroke="white" stroke-width="3.5" opacity="0.9"/>
  <!-- Inner white filled circle -->
  <circle cx="640" cy="250" r="106" fill="white" opacity="0.97"/>
  <!-- Dollar sign icon -->
  <text x="640" y="232" text-anchor="middle" font-family="'PT Sans', Arial, sans-serif" font-size="88" font-weight="400" fill="#b0408a" opacity="0.9">$</text>
  <!-- Tick marks around dollar -->
  <line x1="640" y1="154" x2="640" y2="168" stroke="#b0408a" stroke-width="4" stroke-linecap="round"/>
  <line x1="640" y1="332" x2="640" y2="346" stroke="#b0408a" stroke-width="4" stroke-linecap="round"/>
  <line x1="546" y1="218" x2="557" y2="226" stroke="#b0408a" stroke-width="4" stroke-linecap="round"/>
  <line x1="723" y1="218" x2="734" y2="226" stroke="#b0408a" stroke-width="4" stroke-linecap="round"/>
  <!-- CAPITAL label below circle -->
  <text x="640" y="432" text-anchor="middle" font-family="'PT Sans', Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="3" fill="white">CAPITAL</text>

  <!-- ───────── PROPEL CIRCLE (right) ───────── -->
  <!-- Outer ring -->
  <circle cx="970" cy="220" r="118" fill="none" stroke="white" stroke-width="3.5" opacity="0.9"/>
  <!-- Inner white filled circle -->
  <circle cx="970" cy="220" r="96" fill="white" opacity="0.97"/>
  <!-- Rocket icon -->
  <g transform="translate(900,148) rotate(35,70,72)">
    <!-- Body -->
    <ellipse cx="70" cy="72" rx="20" ry="34" fill="none" stroke="#b0408a" stroke-width="4"/>
    <!-- Nose cone -->
    <path d="M 58,42 Q 70,20 82,42 Z" fill="#b0408a"/>
    <!-- Left fin -->
    <path d="M 52,90 L 40,112 L 58,100 Z" fill="#b0408a"/>
    <!-- Right fin -->
    <path d="M 88,90 L 100,112 L 82,100 Z" fill="#b0408a"/>
    <!-- Window -->
    <circle cx="70" cy="68" r="10" fill="none" stroke="#b0408a" stroke-width="3.5"/>
    <!-- Exhaust flames -->
    <path d="M 60,106 Q 62,122 56,132 Q 70,120 70,106 Q 70,120 84,132 Q 78,122 80,106" fill="#b0408a" opacity="0.6"/>
  </g>
  <!-- PROPEL label above circle -->
  <text x="970" y="82" text-anchor="middle" font-family="'PT Sans', Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="3" fill="white">PROPEL</text>

  <!-- Final upward arrow after Propel -->
  <path d="M 1088,340 Q 1120,260 1130,160" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="1130,160 1118,178 1138,182" fill="white"/>

  <!-- ───────── BOTTOM TAGLINE ───────── -->
  <text x="600" y="486" text-anchor="middle" font-family="'PT Sans', Arial, sans-serif" font-size="24" font-weight="700" fill="white" letter-spacing="0.5">
    Non-Pooled, Proprietary Capital, Operating Private Equity Firm
  </text>
</svg>
